<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="80" fill="url(#grad1)"/>

  <!-- Icon content -->
  <g filter="url(#shadow)">
    <!-- Tools icon representation -->
    <path d="M 180 150 L 250 150 L 250 220 L 180 220 Z" fill="white" opacity="0.9"/>
    <circle cx="295" cy="185" r="35" fill="white" opacity="0.9"/>
    <path d="M 180 260 L 330 260 L 330 290 L 180 290 Z" fill="white" opacity="0.85"/>
    <path d="M 180 320 L 300 320 L 300 350 L 180 350 Z" fill="white" opacity="0.85"/>
  </g>

  <!-- "D" letter for Dev Utils -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="160" fill="white" text-anchor="middle" font-weight="bold">D</text>
</svg>
