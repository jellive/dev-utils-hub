<!DOCTYPE html>
<html>
<head>
  <title>Generate PWA Icons</title>
</head>
<body>
  <h1>PWA Icon Generator</h1>
  <p>Open browser console and run the conversion</p>
  <canvas id="canvas-192" width="192" height="192"></canvas>
  <canvas id="canvas-512" width="512" height="512"></canvas>

  <script>
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
      <rect width="512" height="512" rx="100" fill="#3b82f6"/>
      <text x="256" y="340" font-family="Arial, sans-serif" font-size="280" font-weight="bold" fill="white" text-anchor="middle">DU</text>
    </svg>`;

    function generateIcon(size) {
      const canvas = document.getElementById(`canvas-${size}`);
      const ctx = canvas.getContext('2d');
      const img = new Image();

      img.onload = function() {
        ctx.drawImage(img, 0, 0, size, size);
        canvas.toBlob(function(blob) {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `pwa-${size}x${size}.png`;
          a.click();
          URL.revokeObjectURL(url);
        });
      };

      const blob = new Blob([svg], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      img.src = url;
    }

    // Generate both sizes
    generateIcon(192);
    setTimeout(() => generateIcon(512), 1000);
  </script>
</body>
</html>
